<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
    <title>Odin Library</title>
</head>

<body>
    <div id="app">
        <h1>Odin Library</h1>
        <table>
            <tr>
                <th><label for="title">Title</label></th>
                <th><label for="author">Author</label></th>
                <th><label for="pages">Pages</label></th>
                <th><label for="read">Read</label></th>
            </tr>
        </table>
        <button id="open-modal-btn">Add a book</button>
        <section class="modal hidden">
            <button class="btn-close"><i class="material-icons">clear</i></button>
            <form>

                <label for="title">Title</label>
                <input type="text" name="title" id="title">
                <label for="author">Author</label>
                <input type="text" name="author" id="author">
                <label for="pages">Pages</label>
                <input type="number" name="pages" id="pages">
                <label for="read">Read</label>
                <input type="text" name="read" id="read">
                <div>
                    <button id="cancel-modal-btn">Cancel</button>
                    <button id="add-book-btn">Add Book</button>
                </div>

            </form>
        </section>
        <div class="overlay hidden"></div>
    </div>

</body>

</html>
